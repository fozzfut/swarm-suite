[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "swarmsuite-core"
version = "0.1.0"
description = "Shared foundation for the Swarm Suite -- models, expert registry, session lifecycle, MCP scaffolding, coordination primitives"
readme = "README.md"
license = { text = "MIT" }
requires-python = ">=3.10"
authors = [{ name = "Ilya Sidorov" }]
keywords = ["mcp", "swarm", "ai", "agents", "shared"]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Topic :: Software Development :: Libraries",
]
dependencies = [
    "mcp>=1.6,<2",
    "pyyaml>=6.0,<8",
    "click>=8.0,<9",
]

[project.urls]
Repository = "https://github.com/fozzfut/swarm-suite"

[project.optional-dependencies]
dev = [
    "pytest>=8.0",
    "pytest-asyncio>=0.23",
    "mypy>=1.8",
]

[tool.hatch.build.targets.wheel]
packages = ["src/swarm_core"]

[tool.pytest.ini_options]
testpaths = ["tests"]
asyncio_mode = "auto"

[tool.mypy]
python_version = "3.10"
warn_unused_configs = true
warn_redundant_casts = true
check_untyped_defs = true
no_implicit_optional = true

[[tool.mypy.overrides]]
module = ["mcp.*", "yaml.*", "click.*"]
ignore_missing_imports = true
