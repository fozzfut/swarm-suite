[project]
name = "doc-swarm-ai"
version = "0.2.0"
description = "Multi-agent documentation generator via MCP -- generates, verifies, and maintains project documentation"
requires-python = ">=3.10"
license = { text = "MIT" }
authors = [
    { name = "Ilya Sidorov" },
]
readme = "README.md"
keywords = ["mcp", "documentation", "ai", "agents", "markdown", "obsidian"]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Topic :: Documentation",
    "Topic :: Software Development :: Documentation",
]
dependencies = [
    "click>=8.0,<9",
    "pyyaml>=6.0,<8",
    "mcp>=1.0",
    "swarm-core>=0.1.0",
    "swarm-kb>=0.3.0",
]

[project.urls]
Homepage = "https://github.com/fozzfut/doc-swarm"
Repository = "https://github.com/fozzfut/doc-swarm"

[project.optional-dependencies]
dev = [
    "pytest>=8.0",
    "pytest-asyncio>=0.23",
    "mypy>=1.8",
]

[project.scripts]
doc-swarm = "doc_swarm.cli:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/doc_swarm"]

[tool.hatch.build]
include = ["src/doc_swarm/**/*.py", "src/doc_swarm/**/*.yaml"]

[tool.pytest.ini_options]
testpaths = ["tests"]
asyncio_mode = "auto"

[tool.mypy]
python_version = "3.10"
warn_unused_configs = true
warn_redundant_casts = true
warn_unused_ignores = true
check_untyped_defs = true
no_implicit_optional = true

[[tool.mypy.overrides]]
module = ["yaml.*", "click.*"]
ignore_missing_imports = true
