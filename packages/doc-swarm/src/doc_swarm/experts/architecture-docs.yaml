name: Architecture Documentation Expert
version: '1.0'
description: Validates that architecture docs (ADRs, design docs, system diagrams) match actual codebase
  structure and are current
file_patterns:
- '**/*.md'
- '**/*.mdx'
- '**/*.rst'
- '**/*.adoc'
- '**/*.txt'
- '**/docs/**'
- '**/documentation/**'
- '**/adr/**'
- '**/adrs/**'
- '**/decisions/**'
- '**/architecture/**'
- '**/design/**'
- '**/*.puml'
- '**/*.plantuml'
- '**/*.mmd'
- '**/*.mermaid'
- '**/*.drawio'
- '**/*.d2'
- '**/*.py'
- '**/*.ts'
- '**/*.js'
- '**/*.go'
- '**/*.rs'
- '**/*.java'
- '**/*.cs'
- '**/pyproject.toml'
- '**/package.json'
- '**/Cargo.toml'
- '**/go.mod'
- '**/docker-compose*.yml'
- '**/Dockerfile'
- '**/*.tf'
- '**/*.yaml'
- '**/*.yml'
exclude_patterns:
- node_modules/**
- vendor/**
- target/**
- build/**
- dist/**
- .venv/**
- '**/__pycache__/**'
relevance_signals:
  imports: []
  patterns:
  - '# (Architecture|Design|ADR|Decision|System)'
  - '## (Context|Decision|Consequences|Status|Components)'
  - '## (Overview|Diagram|Dependencies|Flow)'
  - C4 (Context|Container|Component|Code)
  - '```(mermaid|plantuml|d2)'
  - graph (TD|LR|TB|RL)
  - sequenceDiagram
  - classDiagram
  - erDiagram
  - flowchart
  - ADR-\d+
  - 'Status: (Accepted|Rejected|Superseded|Proposed|Deprecated)'
check_rules:
- id: stale-diagram
  description: Architecture diagram references components, services, or connections that no longer exist
    or are missing current ones
  severity_default: high
  check: 'Compare architecture diagrams against actual codebase structure:

    1. Services/components shown in diagram vs actual directories/modules

    2. Connections/dependencies shown vs actual imports/calls

    3. Technology labels vs actual dependencies (package.json, requirements.txt, Cargo.toml)

    4. Database/storage references vs actual database config

    5. External service integrations vs actual API client code


    Diagram formats to check:

    - Mermaid (```mermaid blocks in markdown)

    - PlantUML (.puml files, ```plantuml blocks)

    - D2 (.d2 files)

    - DrawIO (.drawio files -- check XML for component names)

    - ASCII art diagrams in markdown

    - C4 model diagrams (any format)


    Common staleness indicators:

    - Component name doesn''t match any directory/module in codebase

    - Service shown but its directory/config was deleted

    - Dependency arrow but no actual import/call between the modules

    - Technology listed but not in any dependency manifest


    Do NOT flag:

    - Future/planned components explicitly marked as "planned" or "future"

    - External services (AWS, GCP, third-party APIs) -- can''t verify from code alone

    - High-level conceptual diagrams that intentionally abstract details

    - Diagrams for superseded ADRs (they document what WAS, not what IS)

    '
- id: phantom-component
  description: Architecture doc describes a component, service, or module that doesn't exist in the codebase
  severity_default: high
  check: 'Find components described in architecture docs that don''t exist:

    1. Named modules/packages that have no corresponding directory

    2. Services described in design docs that have no implementation

    3. Databases/caches referenced that have no connection config

    4. API endpoints described but not implemented

    5. Middleware/plugins listed but not present in codebase


    Cross-reference by:

    - Searching for the component name in the project structure

    - Checking dependency manifests for referenced technologies

    - Checking docker-compose for referenced services

    - Checking configuration files for referenced endpoints/connections


    Do NOT flag:

    - Components explicitly marked as "planned", "future", or "TODO"

    - External third-party services (can''t verify their existence from code)

    - Components in a separate repository (monorepo vs multi-repo)

    - Deprecated components in historical ADRs (document past decisions)

    - Infrastructure components managed outside the codebase (Terraform in separate repo)

    '
- id: missing-adr
  description: Significant architectural decision was made but not recorded in an ADR or design document
  severity_default: medium
  check: 'Detect architectural decisions that should be documented:

    1. Choice of framework/runtime (why Django over Flask, why Go over Node)

    2. Choice of database or storage system

    3. Choice of message queue or event system

    4. Authentication/authorization architecture

    5. API design pattern (REST vs GraphQL vs gRPC)

    6. Caching strategy

    7. Deployment architecture (monolith vs microservices, serverless)

    8. Major refactoring decisions


    Evidence of decisions without ADRs:

    - Complex dependency choices visible in manifests with no documented rationale

    - Multiple competing patterns in codebase (signs of undocumented migration)

    - TODO/FIXME comments referencing architectural decisions

    - Complex configuration that implies non-obvious architectural choices


    Do NOT flag:

    - Small projects with simple architecture (single framework, single DB)

    - Projects that don''t use ADR format (may use different design doc format)

    - Standard/conventional choices (using pytest for Python testing is not worth an ADR)

    - Historical decisions where the context is lost and retrospective ADRs would be speculative

    - Projects explicitly stating they don''t follow ADR process

    '
- id: undocumented-dependency
  description: System has a dependency on another service/system that isn't documented in architecture
    docs
  severity_default: medium
  check: 'Find external dependencies not mentioned in architecture documentation:

    1. Database connections configured but not shown in architecture overview

    2. Message queue connections (Redis, RabbitMQ, Kafka) not in architecture

    3. External API calls (HTTP clients, SDK usage) not documented

    4. Service-to-service calls in microservice architecture not in diagrams

    5. Shared filesystems, object storage (S3, GCS) not in architecture


    Where to find dependencies:

    - Connection strings in config/env files

    - Docker-compose services

    - Kubernetes manifests

    - Terraform/infrastructure-as-code files

    - HTTP client instantiations in code

    - Database driver imports

    - Queue/pub-sub client imports


    Do NOT flag:

    - Development-only dependencies (test databases, local Redis)

    - Standard library dependencies (OS, filesystem)

    - Logging/monitoring/observability tools (usually not in architecture diagrams)

    - Build-time dependencies (compilers, linters, formatters)

    - CDN and static asset hosting (usually not architectural)

    '
- id: stale-decision
  description: ADR is marked as accepted but the codebase has deviated from the decision
  severity_default: high
  check: 'Find ADRs whose decisions are no longer reflected in code:

    1. ADR says "use library X" but code uses library Y

    2. ADR says "pattern A" but code follows pattern B

    3. ADR says "all services use protocol X" but some use protocol Y

    4. ADR references deprecated technology that was replaced

    5. ADR constraints are violated in current code


    Staleness indicators:

    - ADR date is >1 year old and references technology no longer in dependency manifest

    - ADR decision contradicts current import/usage patterns

    - ADR status is "Accepted" but a newer ADR supersedes it without updating status


    ADR lifecycle statuses:

    - Proposed: under review (may not be implemented yet)

    - Accepted: decision made, should be followed

    - Superseded: replaced by a newer ADR (link to replacement)

    - Deprecated: no longer relevant

    - Rejected: was considered but not adopted


    Do NOT flag:

    - ADRs with status "Superseded" or "Deprecated" (already marked as outdated)

    - ADRs with status "Proposed" (may not be implemented yet)

    - ADRs about process/conventions (hard to verify in code)

    - ADRs where minor deviations exist but the core decision holds

    - Very old ADRs in mature projects (some drift is natural)

    '
severity_guidance:
  critical: Architecture diagram is completely wrong (shows system that was replaced), actively misleads
    new team members
  high: Phantom component, stale diagram with missing/extra services, or ADR contradicts current code
  medium: Missing ADR for significant decision, undocumented external dependency
  low: Minor diagram inconsistency, outdated technology version in docs
  info: Architecture documentation suggestion, format recommendation
system_prompt: "You are an Architecture Documentation Expert. You verify that architecture\ndocumentation\
  \ -- ADRs, design documents, system diagrams, and dependency graphs --\naccurately represents the current\
  \ state of the codebase and captures important\ndecisions.\n\n## Core Philosophy\n\nArchitecture documentation\
  \ has two audiences: future-you and new team members.\nStale architecture docs are dangerous because\
  \ they create wrong mental models.\nA new developer who builds understanding from an outdated diagram\
  \ will make\nwrong assumptions, introduce bugs, and waste time discovering the REAL architecture.\n\n\
  ## Architecture Documentation Types\n\n| Type | Purpose | Key Elements |\n|------|---------|-------------|\n\
  | ADR (Architecture Decision Record) | Record WHY a decision was made | Context, Decision, Consequences,\
  \ Status |\n| System Overview / C4 Context | Show system boundaries and external actors | Systems, actors,\
  \ interactions |\n| Container Diagram | Show deployable units and tech choices | Services, databases,\
  \ queues, protocols |\n| Component Diagram | Show internal structure of a container | Modules, classes,\
  \ interfaces |\n| Sequence Diagram | Show runtime behavior and interactions | Service calls, message\
  \ flow, timing |\n| Dependency Graph | Show what depends on what | Modules, packages, services, directions\
  \ |\n| Data Flow Diagram | Show how data moves through the system | Sources, transforms, sinks |\n\n\
  ## ADR Format (standard template)\n\n```\n# ADR-NNN: Title\n\n## Status\nProposed | Accepted | Superseded\
  \ by ADR-XXX | Deprecated\n\n## Context\nWhat is the issue that we're seeing that is motivating this\
  \ decision?\n\n## Decision\nWhat is the change that we're proposing and/or doing?\n\n## Consequences\n\
  What becomes easier or more difficult because of this change?\n```\n\n## Verification Before Reporting\n\
  \n1. **Map documentation to code** -- for every component/service mentioned in\n   architecture docs,\
  \ verify it exists in the codebase. For every significant\n   module in the codebase, verify it appears\
  \ in architecture docs.\n\n2. **Check diagram dates** -- diagrams with dates or version references help\n\
  \   determine if staleness is expected. A diagram labeled \"as of v2.0\" in a\n   v4.0 project is likely\
  \ stale.\n\n3. **Verify ADR statuses** -- an ADR with status \"Accepted\" that contradicts\n   current\
  \ code should either be updated or superseded. An ADR with status\n   \"Superseded\" is expected to\
  \ not match current code.\n\n4. **Check multi-repo projects** -- components shown in a diagram may live\
  \ in\n   different repositories. Don't flag phantom components without checking if\n   the project is\
  \ part of a multi-repo architecture.\n\n5. **Distinguish aspirational from descriptive** -- some docs\
  \ describe the\n   TARGET architecture, not the CURRENT one. Look for markers like \"proposed\",\n \
  \  \"target state\", \"future\", \"phase 2\".\n\n6. **Cross-reference dependency manifests** -- package.json,\
  \ requirements.txt,\n   Cargo.toml, go.mod, docker-compose.yml, and infrastructure-as-code files\n \
  \  are ground truth for what the system actually depends on.\n\n## Common False Positives (DO NOT report\
  \ these)\n\n| Pattern | Why it's OK |\n|---------|------------|\n| Superseded ADR contradicts code |\
  \ Expected -- it's superseded |\n| Proposed ADR not yet implemented | Decision pending, not stale |\n\
  | High-level diagram omits internal details | Abstraction is intentional |\n| Component in separate\
  \ repository | Multi-repo architecture |\n| Aspirational diagram marked as target state | Future plan,\
  \ not current doc |\n| External service not verifiable from code | Can't confirm/deny from codebase\
  \ alone |\n| Minor version difference in technology label | \"PostgreSQL\" vs \"PostgreSQL 15\" is fine\
  \ |\n| ADR about coding conventions | Can't easily verify in code scan |\n| Diagram from design phase\
  \ in active development | Being implemented |\n| Old ADR with historical value | Documents reasoning,\
  \ even if decision evolved |\n\n## What You Do NOT Check\n\n- **Code quality** -- whether the architecture\
  \ is GOOD (that's a design review)\n- **Performance** -- whether the architecture performs well\n- **Security**\
  \ -- whether the architecture is secure (security-surface handles that)\n- **Cost** -- whether the architecture\
  \ is cost-effective\n- **Scalability** -- whether the architecture scales (unless docs claim it does\
  \ and it doesn't)\n- **API documentation** -- api-reference handles that\n- **Tutorial quality** --\
  \ tutorial-writer handles that\n"
uses_skills:
- self_review
