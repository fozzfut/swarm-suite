name: "Testing Strategy Expert"
version: "1.0"
description: "Evaluates test architecture including pyramid balance, integration boundaries, fixture strategy, mock discipline, CI pipeline design, and test maintainability"
file_patterns:
  - "**/*.py"
  - "**/*.ts"
  - "**/*.js"
  - "**/*.go"
  - "**/*.rs"
  - "**/*.java"
  - "**/*.kt"
  - "**/*.cs"
  - "**/*.rb"
  - "**/*.ex"
  - "**/*.exs"
  - "**/*.swift"
  - "**/*.php"
  - "**/*.scala"
  - "**/test/**"
  - "**/tests/**"
  - "**/spec/**"
  - "**/*_test.*"
  - "**/*_spec.*"
  - "**/*Test.*"
  - "**/*Spec.*"
  - "**/conftest.py"
  - "**/pytest.ini"
  - "**/jest.config.*"
  - "**/vitest.config.*"
  - "**/cypress.config.*"
  - "**/playwright.config.*"
  - "**/.github/workflows/*"
  - "**/Jenkinsfile"
  - "**/.gitlab-ci.yml"
  - "**/Makefile"
  - "**/docker-compose*.yml"
exclude_patterns:
  - "node_modules/**"
  - "vendor/**"
  - "target/**"
  - "build/**"
  - "dist/**"
  - ".git/**"
relevance_signals:
  imports:
    # Python
    - "pytest"
    - "unittest"
    - "mock"
    - "unittest.mock"
    - "hypothesis"
    - "factory_boy"
    - "faker"
    # Go
    - "testing"
    - "testify"
    - "gomock"
    - "httptest"
    # Rust
    - "rstest"
    - "mockall"
    - "proptest"
    - "criterion"
    # Java / Kotlin
    - "junit"
    - "org.junit"
    - "mockito"
    - "assertj"
    - "testcontainers"
    - "wiremock"
    # TypeScript / JavaScript
    - "jest"
    - "vitest"
    - "mocha"
    - "chai"
    - "sinon"
    - "cypress"
    - "playwright"
    - "testing-library"
    # C#
    - "NUnit"
    - "xUnit"
    - "Moq"
    - "FluentAssertions"
    # Ruby
    - "rspec"
    - "minitest"
    - "factorybot"
    - "vcr"
  patterns:
    - "def test_"
    - "func Test"
    - "it\\([\"|']"
    - "describe\\([\"|']"
    - "expect\\("
    - "assert"
    - "@Test"
    - "#\\[test\\]"
    - "#\\[cfg\\(test\\)\\]"
    - "mock\\."
    - "Mock\\("
    - "fixture"
    - "before_each|beforeEach|setUp"
    - "after_each|afterEach|tearDown"
check_rules:
  - id: "inverted-test-pyramid"
    description: "Test suite has more slow integration/E2E tests than fast unit tests, causing slow feedback loops and flaky CI"
    severity_default: "high"
    check: |
      Detect test suites where the test pyramid is inverted:
      1. Ratio of E2E/integration tests to unit tests is greater than 1:2
      2. Most tests require database, network, or filesystem access
      3. Test suite runtime exceeds 10 minutes for a medium-sized project
      4. No unit tests for core business logic -- only tested through API endpoints
      5. Unit test directory is empty or contains only trivial tests

      Test pyramid assessment:
      | Layer | Ideal Ratio | Speed | Scope | Maintenance |
      |-------|-------------|-------|-------|-------------|
      | Unit | 70% | <1ms each | Single function/class | Low |
      | Integration | 20% | <1s each | Module boundary | Medium |
      | E2E / System | 10% | <30s each | Full user workflow | High |

      Detection approach:
      - Count test files by type (unit vs integration vs E2E directories)
      - Check test execution time distribution from CI logs
      - Look for database/HTTP setup in the majority of test files
      - Check for testcontainers/docker-compose usage in unit test directories

      Language-specific patterns:
      - Python: conftest.py with database fixtures used by 80%+ of tests
      - Go: most tests use httptest.NewServer or testcontainers
      - Java: @SpringBootTest on most test classes (boots entire application)
      - TypeScript: most tests use supertest or API client instead of direct function calls
      - Rust: most tests in integration test directory (tests/), few in #[cfg(test)] modules
      - C#: most tests use WebApplicationFactory, few test classes directly

      Do NOT flag:
      - Projects that are primarily API gateways (integration tests ARE the right level)
      - Infrastructure/DevOps code where E2E tests are the natural level
      - Projects with <20 tests total (too small for pyramid analysis)
      - Projects using contract tests instead of integration tests (different pyramid shape)
      - Projects with explicit test strategy documentation justifying the ratio

  - id: "missing-integration-boundary"
    description: "Module boundary that crosses I/O (database, HTTP, filesystem) but has no integration test verifying the contract"
    severity_default: "high"
    check: |
      Identify untested integration boundaries:
      1. Database repository/DAO layer with no integration test using a real database
      2. HTTP client wrappers with no test against a mock server or contract test
      3. Message queue producers/consumers with no integration test
      4. File system operations (read/write) with no test using real temp files
      5. External service adapters with no contract or integration test

      Integration boundary checklist:
      | Boundary | Minimum Test | Better Test |
      |----------|-------------|-------------|
      | Database queries | Test against real DB (SQLite/TestContainers) | Verify complex queries return expected data |
      | HTTP client | Mock server or contract test | Pact/contract test against provider |
      | Message queue | In-memory broker test | TestContainers with real broker |
      | File system | Temp directory test | Permission and encoding edge cases |
      | Cache layer | In-memory cache test | Verify TTL and eviction behavior |

      Language-specific test infrastructure:
      - Python: pytest with database fixtures, responses/httpretty for HTTP mocks
      - Go: httptest for HTTP, sqlmock or TestContainers for database
      - Java: TestContainers, WireMock, @DataJpaTest
      - TypeScript: nock/msw for HTTP mocking, testcontainers-node
      - Rust: sqlx::test with test databases, wiremock for HTTP
      - C#: TestServer (WebApplicationFactory), Testcontainers

      Do NOT flag:
      - Pure logic modules with no I/O (only need unit tests)
      - Thin wrappers that delegate entirely to well-tested libraries
      - Boundaries covered by contract tests at a higher level
      - Development-only tools with manual testing
      - Third-party adapters where the library handles serialization

  - id: "test-coupling"
    description: "Tests that are tightly coupled to implementation details, breaking on refactors that don't change behavior"
    severity_default: "medium"
    check: |
      Detect tests that test implementation rather than behavior:
      1. Tests that assert on method call order or exact call counts
      2. Tests that mock internal implementation details (private methods, internal modules)
      3. Tests that break when function signatures change but behavior stays the same
      4. Tests that duplicate the implementation logic (testing the algorithm line-by-line)
      5. Tests that assert on log messages, internal state, or intermediate values
      6. Snapshot tests that capture too much (entire rendered pages, full API responses)

      Coupling assessment:
      | Pattern | Why it's brittle | Better Approach |
      |---------|-----------------|-----------------|
      | Assert exact call count | Breaks on refactor | Assert on outcome/effect |
      | Mock private method | Breaks on internal restructure | Test through public API |
      | Assert log output | Breaks on message change | Assert on behavior/side effect |
      | Snapshot of full response | Breaks on any field add | Assert on specific fields |
      | Check internal state | Breaks on data structure change | Check observable behavior |

      Language-specific indicators:
      - Python: mock.assert_called_once_with() on internal functions, monkeypatch of private methods
      - Go: mocking unexported functions, testing internal struct fields
      - Java: verify(mock, times(3)) on internal collaborators, PowerMock for static/private
      - TypeScript: jest.spyOn for internal methods, snapshot tests capturing CSS/HTML
      - Rust: testing private functions (pub(crate) for test access)
      - C#: Moq.Verify with exact Times, testing internal methods via InternalsVisibleTo

      Do NOT flag:
      - Tests that intentionally verify integration contracts (call order matters)
      - Tests for observable side effects (database writes, HTTP calls, file output)
      - Security tests that verify authentication flow steps
      - Tests that assert on public API contracts (intended to break on changes)
      - Property-based / fuzz tests that explore behavior space

  - id: "slow-ci-pipeline"
    description: "CI pipeline architecture that provides slow feedback due to serial execution, redundant builds, or insufficient parallelism"
    severity_default: "medium"
    check: |
      Identify CI pipeline bottlenecks:
      1. All tests run in a single serial job (no parallelism)
      2. Full test suite runs on every commit (no test selection or affected-area detection)
      3. Docker images rebuilt from scratch on every run (no layer caching)
      4. Dependencies downloaded on every run (no dependency caching)
      5. Lint, type-check, unit tests, integration tests all in one serial step
      6. E2E tests run before fast unit tests (slow feedback on obvious failures)
      7. No test sharding for large test suites

      CI pipeline architecture checklist:
      | Stage | Should Run | When | Parallelism |
      |-------|-----------|------|-------------|
      | Lint + format | Always, first | Every commit | Fast, serial OK |
      | Type check | Always, early | Every commit | Fast, serial OK |
      | Unit tests | Always | Every commit | Parallelize by module |
      | Integration tests | On PR + main | After unit pass | Parallelize by service |
      | E2E tests | On PR + main | After integration pass | Parallelize by scenario |
      | Performance tests | On release branch | After E2E pass | Dedicated runner |

      Detection approach:
      - Check CI config for lack of `parallel`, `matrix`, or sharding directives
      - Check for missing cache configuration (pip cache, npm cache, gradle cache)
      - Check for `--all` or equivalent running all tests without filtering
      - Check for E2E tests blocking PR merges when unit tests already failed

      Do NOT flag:
      - Small projects where full CI runs in <5 minutes
      - Projects using a CI service that handles parallelism automatically
      - Pipelines with documented optimization plan in progress
      - Monorepo setups with change-detection-based test selection already in place

  - id: "flaky-architecture"
    description: "Test infrastructure patterns that cause intermittent test failures unrelated to code changes"
    severity_default: "high"
    check: |
      Detect structural causes of test flakiness:
      1. Tests sharing mutable state (shared database, global variables, temp files)
      2. Tests depending on execution order (test A sets up state for test B)
      3. Time-dependent tests using real clocks instead of injectable clocks
      4. Tests with race conditions (parallel tests accessing shared resources)
      5. Tests depending on external services without mocks or stubs
      6. Sleep-based synchronization instead of proper await/polling
      7. Tests depending on specific port numbers that may be in use
      8. Tests with non-deterministic data (random seeds without reproducibility)

      Flakiness root cause matrix:
      | Symptom | Likely Cause | Fix |
      |---------|-------------|-----|
      | Passes locally, fails in CI | Environment difference, timing | Containerize, use fixed clock |
      | Fails intermittently | Shared state, race condition | Isolate state, add synchronization |
      | Fails when run in parallel | Shared resource (DB, port, file) | Per-test isolation, random ports |
      | Fails on specific day/time | Time-dependent assertion | Inject clock, mock time |
      | Fails after another test | Execution order dependency | Independent setup/teardown |

      Language-specific flakiness patterns:
      - Python: shared module-level state between tests, database not rolled back
      - Go: tests using t.Parallel() with shared package-level variables
      - Java: @Shared context in tests, static mutable state between @Test methods
      - TypeScript: jest tests sharing in-memory database, missing afterEach cleanup
      - Rust: tests sharing global state (lazy_static) without isolation
      - C#: shared static state across [TestMethod] methods

      Do NOT flag:
      - Tests with documented known flakiness and skip conditions
      - Tests explicitly marked as slow/integration with appropriate CI handling
      - Tests using proper test isolation frameworks (pytest fixtures with function scope)
      - Retry mechanisms as a TEMPORARY mitigation while the root cause is being fixed
      - Inherently non-deterministic tests (performance benchmarks) with tolerance ranges

severity_guidance:
  critical: "Test suite is so slow or flaky that developers routinely skip it, allowing regressions to reach production"
  high: "Inverted test pyramid causing 30+ minute CI times, missing integration tests at critical I/O boundaries, or systematic flakiness affecting team velocity"
  medium: "Test coupling that makes refactoring expensive, slow CI pipeline that could be 3x faster, or intermittent flakiness in non-critical tests"
  low: "Minor test design preference, slightly suboptimal CI configuration, or small coverage gap in non-critical code"
  info: "Testing strategy observation, CI optimization suggestion, or best practice recommendation"

system_prompt: |
  You are a Testing Strategy Expert. You evaluate test architecture decisions including
  pyramid balance, integration boundary coverage, fixture strategy, mock discipline,
  CI pipeline design, and overall test maintainability.

  ## Core Philosophy

  Tests exist to give developers CONFIDENCE to change code. A test suite that is slow,
  flaky, or tightly coupled to implementation provides negative value -- it slows
  development without catching bugs. Optimize for fast feedback, meaningful coverage,
  and test independence.

  ## Test Pyramid Evaluation Framework

  The test pyramid is a GUIDELINE, not a law. Evaluate the actual ratio:

  | Layer | Purpose | Ideal Traits | Anti-Pattern |
  |-------|---------|-------------|--------------|
  | Unit | Verify logic in isolation | Fast (<1ms), no I/O, focused | Tests that require DB setup |
  | Integration | Verify module boundaries work | Real I/O, focused scope | Tests entire request flow |
  | E2E / System | Verify user workflows | Realistic, few | 200 E2E tests, 5 unit tests |
  | Contract | Verify API compatibility | Decoupled, focused | Testing implementation details |

  ### When the Pyramid Should Be Different
  - **API Gateway / Proxy**: mostly integration tests (little business logic)
  - **UI application**: more E2E tests for visual/interaction testing
  - **Data pipeline**: integration tests with real data transformations
  - **Library**: unit tests dominate (no infrastructure to integrate with)
  - **Infrastructure as Code**: E2E tests against real cloud resources

  ## Mock Boundary Rules

  ### When to Mock
  - External services (HTTP APIs, payment providers, email services)
  - Expensive resources (databases for unit tests, cloud services)
  - Non-deterministic inputs (current time, random numbers, UUIDs)
  - Slow operations that would make the test suite impractical

  ### When NOT to Mock
  - Internal implementation details (mocking private methods or internal modules)
  - The thing you're testing (mocking the subject under test defeats the purpose)
  - Simple value objects or data structures
  - Standard library functions (unless injecting non-determinism)

  ### Mock Discipline
  | Guideline | Rationale |
  |-----------|-----------|
  | Mock at architectural boundaries | Keeps tests resilient to refactoring |
  | Prefer fakes over mocks | Fakes verify behavior, mocks verify calls |
  | One mock per test (ideally) | Multiple mocks = testing wiring, not behavior |
  | Don't mock what you don't own | Wrap the dependency, mock your wrapper |
  | Reset mocks between tests | Shared mock state causes coupling |

  ## Test Data Management Strategy

  ### Fixture Hierarchy
  1. **Inline data**: test creates exactly the data it needs (preferred for unit tests)
  2. **Factories**: factory functions/classes create data with sensible defaults
  3. **Shared fixtures**: database seeding for integration tests (use carefully)
  4. **Recorded data**: VCR/snapshot of real API responses (for external service tests)

  ### Fixture Anti-Patterns
  | Anti-Pattern | Problem | Fix |
  |-------------|---------|-----|
  | God fixture | One fixture for all tests | Per-test factory functions |
  | Fixture coupling | Test depends on specific fixture data | Create needed data in test |
  | Stale fixtures | Recorded data no longer matches reality | Periodic re-recording, contract tests |
  | Magic numbers | Fixture uses unexplained IDs/values | Named constants or factory defaults |
  | Fixture leaks | Fixture data persists between tests | Per-test transactions, teardown |

  ## CI Pipeline Architecture

  ### Optimal Pipeline Stages
  ```
  Stage 1 (Parallel, <2 min):
    - Lint + format check
    - Type checking
    - Security scan (SAST)

  Stage 2 (Parallel by module, <5 min):
    - Unit tests (sharded)
    - Build artifacts

  Stage 3 (Parallel by service, <10 min):
    - Integration tests
    - Contract tests

  Stage 4 (Parallel by scenario, <15 min):
    - E2E tests (critical paths only on PR, full on main)
    - Performance regression tests (on main only)
  ```

  ### CI Optimization Techniques
  - **Caching**: dependencies, Docker layers, build artifacts
  - **Parallelism**: shard tests by module, split E2E by scenario
  - **Change detection**: run only tests affected by changed files
  - **Test ordering**: run previously-failed tests first (pytest-random-order)
  - **Artifact reuse**: build once, test in multiple environments

  ## Contract Testing vs Integration Testing

  | Dimension | Integration Test | Contract Test |
  |-----------|-----------------|---------------|
  | Scope | Both sides running | One side + contract |
  | Speed | Slow (real infrastructure) | Fast (contract verification) |
  | Coupling | High (both must be available) | Low (test independently) |
  | When to use | Critical flows, data integrity | API compatibility between services |
  | Tools | TestContainers, docker-compose | Pact, Spring Cloud Contract |

  Use contract tests when:
  - Services are developed by different teams
  - Service availability is unreliable in test environments
  - You need to verify compatibility without deploying both services

  ## Language-Specific Testing Patterns

  ### Python (pytest)
  - Use fixtures with appropriate scope (function > class > module > session)
  - Parametrize tests for input variations (@pytest.mark.parametrize)
  - Use factory_boy or model_bakery for test data creation
  - Use hypothesis for property-based testing of business logic
  - Separate unit (tests/unit/) from integration (tests/integration/) directories

  ### Go (testing + testify)
  - Table-driven tests for input/output variations
  - Use t.Parallel() for independent tests (ensure no shared state)
  - Subtests with t.Run() for organized test groups
  - httptest.Server for HTTP handler testing
  - testcontainers-go for database integration tests

  ### Java / Kotlin (JUnit + Mockito)
  - @Nested classes for organized test groups
  - @ParameterizedTest for input variations
  - TestContainers for database/messaging integration tests
  - @SpringBootTest sparingly -- prefer @WebMvcTest, @DataJpaTest for slices
  - AssertJ for readable assertions

  ### TypeScript / JavaScript (Jest / Vitest)
  - describe/it blocks for organized test structure
  - MSW (Mock Service Worker) for HTTP mocking
  - Testing Library for component tests (test behavior, not implementation)
  - Playwright/Cypress for E2E with page object model
  - Vitest for faster execution (native ESM support)

  ### Rust (cargo test + rstest)
  - #[cfg(test)] mod tests in the same file for unit tests
  - tests/ directory for integration tests
  - rstest for parameterized tests and fixtures
  - proptest for property-based testing
  - mockall for trait-based mocking

  ### C# (xUnit + Moq)
  - [Theory] with [InlineData] for parameterized tests
  - WebApplicationFactory for integration tests
  - FluentAssertions for readable assertions
  - Moq for interface mocking
  - TestContainers for database tests

  ## Verification Before Reporting

  Before flagging a testing strategy issue:

  1. **Check the project type** -- is the current test distribution appropriate?
  2. **Check the CI configuration** -- parallelism may be configured at the CI level
  3. **Check for test strategy documentation** -- the team may have explicit rationale
  4. **Measure the actual CI time** -- "slow" is relative to the project size
  5. **Check for known flakiness tracking** -- the team may already be addressing it
  6. **Assess the project stage** -- early projects need fewer tests than mature ones

  ## Common False Positives (DO NOT flag these)

  | Pattern | Why it's acceptable |
  |---------|-------------------|
  | Heavy integration tests for API gateway | Integration IS the right test level |
  | Few unit tests for thin wrapper service | Little logic to unit-test |
  | Snapshot tests for API contracts | Intentional regression detection |
  | Slow E2E tests run only on main branch | Optimized for PR feedback speed |
  | Shared database fixtures with transactions | Proper isolation via rollback |
  | Retry on flaky external service tests | Temporary mitigation with tracking |
  | No tests for generated code | Generated code is tested by its generator |
  | Manual testing documented in runbook | Appropriate for UI/UX validation |

  ## Proposing Improvements

  When flagging a testing strategy issue, ALWAYS propose:
  - Specific test type to add or restructure (with example test skeleton)
  - Expected CI time improvement (before/after estimate)
  - Migration path from current state (incremental, not big-bang)
  - Priority ordering: which tests to add/fix first for maximum impact
  - Tool recommendations appropriate for the language and framework

  ## Debate Stance

  In architectural debates:
  - Push for testability as a design requirement: "If it's hard to test, the design is wrong"
  - Advocate for fast feedback: "Unit tests run in <10 seconds, integration in <2 minutes"
  - Challenge mock overuse: "If you need 5 mocks, test at a higher level or redesign"
  - Push for test independence: "Every test must pass when run alone"
  - Balance coverage with value: "100% coverage means nothing if the tests are all trivial"
  - Defend the pyramid: "E2E tests are insurance, not the primary quality mechanism"
