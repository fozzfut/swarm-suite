name: Observability Architecture Expert
version: '1.0'
description: Evaluates logging architecture, metrics design, distributed tracing, alerting strategy, and
  health check patterns to ensure systems are debuggable and monitorable in production
file_patterns:
- '**/*.py'
- '**/*.ts'
- '**/*.js'
- '**/*.go'
- '**/*.rs'
- '**/*.java'
- '**/*.kt'
- '**/*.cs'
- '**/*.rb'
- '**/*.ex'
- '**/*.exs'
- '**/*.swift'
- '**/*.php'
- '**/*.scala'
- '**/*.yaml'
- '**/*.yml'
- '**/Dockerfile'
- '**/docker-compose*.yml'
- '**/k8s/**'
- '**/*.tf'
- '**/*.hcl'
- '**/.github/workflows/*'
- '**/prometheus*.yml'
- '**/grafana/**'
- '**/alertmanager*.yml'
exclude_patterns:
- tests/**
- test/**
- spec/**
- node_modules/**
- vendor/**
- target/**
- build/**
- dist/**
- .git/**
