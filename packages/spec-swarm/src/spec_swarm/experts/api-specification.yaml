name: "API Specification Expert"
version: "1.0"
description: "Evaluates OpenAPI/Swagger, gRPC protobuf, GraphQL schemas, and REST API documentation for correctness, consistency, completeness, and best practices"
domain: "universal"
relevance_keywords:
  - "api"
  - "openapi"
  - "swagger"
  - "rest"
  - "grpc"
  - "protobuf"
  - "graphql"
  - "endpoint"
  - "schema"
  - "request"
  - "response"
  - "http"
  - "status code"
  - "json"
  - "payload"
  - "query"
  - "mutation"
  - "subscription"
  - "rpc"
  - "service"
  - "method"
  - "path"
  - "resource"
  - "versioning"
  - "authentication"
  - "authorization"
  - "oauth"
  - "bearer"
  - "api key"
  - "rate limit"
  - "pagination"
  - "webhook"

check_rules:
  - id: "missing-error-response"
    description: "API endpoint defines success responses but omits error responses, leaving clients unable to handle failures"
    severity_default: "high"
    check: |
      Verify all endpoints define error responses for common failure modes:

      Required error responses for REST APIs:
      | Status code | When required                                 | Example                          |
      |-------------|-----------------------------------------------|----------------------------------|
      | 400         | Any endpoint accepting user input              | Validation errors, bad JSON      |
      | 401         | Any endpoint requiring authentication          | Missing/expired token            |
      | 403         | Any endpoint with authorization rules          | Insufficient permissions         |
      | 404         | Any endpoint with path parameters              | Resource not found               |
      | 409         | Any endpoint creating/updating resources       | Duplicate key, version conflict  |
      | 422         | Complex validation beyond basic format         | Business rule violation          |
      | 429         | Any public-facing endpoint                     | Rate limit exceeded              |
      | 500         | ALL endpoints (catch-all server error)         | Unexpected internal error        |
      | 503         | Endpoints depending on external services       | Downstream service unavailable   |

      Error response body requirements:
      - Consistent error schema across ALL endpoints (not ad-hoc per endpoint)
      - Machine-readable error code (not just HTTP status)
      - Human-readable message
      - Optional: field-level validation errors for 400/422
      - Optional: request ID for correlation

      Recommended error schema:
      ```json
      {
        "error": {
          "code": "VALIDATION_FAILED",
          "message": "Email address is not valid",
          "details": [
            {"field": "email", "issue": "Invalid format", "value": "not-an-email"}
          ],
          "request_id": "req_abc123"
        }
      }
      ```

      gRPC error handling:
      - Use standard gRPC status codes (OK, CANCELLED, INVALID_ARGUMENT, NOT_FOUND, etc.)
      - Use google.rpc.Status with details for rich error information
      - Define error details in .proto files (google.rpc.BadRequest, etc.)

      GraphQL error handling:
      - Errors array in response body (per GraphQL spec)
      - Use extensions field for machine-readable error codes
      - Partial success handling (some fields resolve, some error)

      Do NOT flag:
      - Internal microservice APIs where error handling is documented elsewhere
      - Prototype/draft APIs explicitly labeled as incomplete
      - Health check endpoints that only return 200 or 503

  - id: "inconsistent-naming"
    description: "API uses inconsistent naming conventions across endpoints, parameters, fields, or schemas"
    severity_default: "medium"
    check: |
      Check naming consistency across the entire API surface:

      REST resource naming:
      - Plural nouns for collections: /users, /orders, /products (not /user, /order)
      - Singular for singletons: /users/{id}/profile (not /profiles)
      - Lowercase with hyphens: /user-profiles (not /userProfiles, /user_profiles, /UserProfiles)
      - No verbs in paths: /users (POST to create) not /createUser
      - Consistent hierarchy: /users/{id}/orders/{id} not /user-orders/{user_id}/{order_id}

      Field naming conventions (pick ONE and be consistent):
      | Convention   | Example           | Common in                        |
      |-------------|-------------------|----------------------------------|
      | camelCase    | firstName         | JavaScript/TypeScript, JSON APIs |
      | snake_case   | first_name        | Python, Ruby, PostgreSQL         |
      | PascalCase   | FirstName         | C#, .NET APIs                    |
      | kebab-case   | first-name        | HTTP headers, URL paths          |

      What to check:
      - All fields in all schemas use the same case convention
      - Boolean fields use consistent prefixes: is_, has_, can_ (or none)
      - Date/time fields use consistent naming: created_at vs createdAt vs creation_date
      - ID fields are consistent: id vs ID vs Id, user_id vs userId
      - Enum values use consistent casing: UPPER_SNAKE vs lowercase vs PascalCase
      - Query parameters match field names in response bodies
      - HTTP header names follow standard conventions (X-Request-Id, not x_request_id)

      gRPC naming (per Google style guide):
      - Service names: PascalCase (UserService)
      - RPC methods: PascalCase (GetUser, ListUsers, CreateUser)
      - Message names: PascalCase (GetUserRequest, GetUserResponse)
      - Field names: snake_case (user_id, created_at)
      - Enum values: UPPER_SNAKE_CASE (STATUS_ACTIVE, STATUS_INACTIVE)

      GraphQL naming:
      - Types: PascalCase (User, OrderItem)
      - Fields: camelCase (firstName, createdAt)
      - Enum values: UPPER_SNAKE_CASE (ACTIVE, PENDING_REVIEW)
      - Query/Mutation names: camelCase (getUser, createOrder)
      - Input types: PascalCase with Input suffix (CreateUserInput)

      Do NOT flag:
      - APIs that follow a documented internal style guide, even if unconventional
      - Legacy endpoints kept for backward compatibility alongside new naming
      - Standard headers (Content-Type, Authorization) that follow HTTP conventions

  - id: "breaking-change-unversioned"
    description: "API change would break existing clients but no versioning strategy is in place to manage the transition"
    severity_default: "critical"
    check: |
      Detect breaking changes that lack versioning protection:

      Breaking changes in REST APIs:
      - Removing an endpoint
      - Removing or renaming a field from a response body
      - Changing a field type (string to integer, object to array)
      - Adding a required field to a request body
      - Changing the meaning/behavior of an existing field
      - Changing error response format
      - Changing authentication mechanism
      - Tightening validation (rejecting previously accepted input)
      - Changing URL structure or path parameters

      Non-breaking changes (safe without versioning):
      - Adding a new optional field to request or response
      - Adding a new endpoint
      - Adding a new optional query parameter
      - Relaxing validation (accepting more input)
      - Adding new enum values (if clients handle unknown values)
      - Adding new error codes (if clients have catch-all handling)

      Versioning strategies (one must be present for breaking changes):
      | Strategy          | Example                    | Pros                        | Cons                       |
      |-------------------|----------------------------|-----------------------------|----------------------------|
      | URL path          | /v1/users, /v2/users       | Explicit, easy to route     | URL pollution              |
      | Header            | Accept: application/vnd.api.v2+json | Clean URLs         | Less visible               |
      | Query parameter   | /users?version=2           | Easy to test                | Pollutes query string      |
      | Content negotiation| Accept: application/vnd.api+json;version=2 | RESTful   | Complex                    |

      gRPC versioning:
      - Package versioning: package myapi.v1; vs package myapi.v2;
      - Field numbers MUST NOT be reused after removal
      - Use reserved keyword for removed fields
      - Backward compatible: add optional fields, add new RPC methods

      GraphQL versioning:
      - GraphQL recommends evolution over versioning
      - Use @deprecated directive on fields slated for removal
      - Add new fields alongside deprecated ones during transition
      - Monitor usage of deprecated fields before removal

      Do NOT flag:
      - APIs in pre-release (v0.x) where breaking changes are expected
      - Internal APIs with coordinated client updates
      - Changes accompanied by proper deprecation timeline and migration guide

  - id: "missing-auth-spec"
    description: "API endpoint handles sensitive operations but has no authentication or authorization specification"
    severity_default: "critical"
    check: |
      Verify authentication and authorization are specified for all endpoints:

      Authentication requirements:
      - OpenAPI: securitySchemes defined in components, security applied globally or per-operation
      - Every endpoint should explicitly state its auth requirement (even if "none")
      - Supported schemes should be documented:
        - Bearer token (JWT, opaque)
        - API key (header, query, cookie)
        - OAuth 2.0 (flows: authorization code, client credentials, etc.)
        - Basic auth (only acceptable over TLS)
        - mTLS (mutual TLS for service-to-service)

      Authorization requirements:
      - Which roles/permissions can access each endpoint
      - Resource-level access control (can user A access user B's data?)
      - Rate limiting per client/tier
      - IP allowlisting for admin endpoints

      OpenAPI security specification:
      ```yaml
      components:
        securitySchemes:
          bearerAuth:
            type: http
            scheme: bearer
            bearerFormat: JWT
          apiKey:
            type: apiKey
            in: header
            name: X-API-Key
      security:
        - bearerAuth: []    # global default
      paths:
        /public/health:
          get:
            security: []    # explicitly public (no auth)
        /admin/users:
          get:
            security:
              - bearerAuth: [admin]   # requires admin scope
      ```

      gRPC authentication:
      - Channel credentials (TLS, ALTS for Google Cloud)
      - Call credentials (token-based, per-RPC)
      - Interceptors for auth enforcement
      - Define in service documentation which RPCs require what credentials

      GraphQL authentication:
      - Context-based auth (token in HTTP header, passed via context)
      - Directive-based: @auth(requires: ADMIN) on fields/types
      - Resolver-level authorization checks documented

      Sensitive operations that MUST have auth specified:
      - Any data mutation (create, update, delete)
      - Access to personal/private data
      - Administrative operations
      - Financial transactions
      - File uploads/downloads of non-public content

      Do NOT flag:
      - Explicitly public endpoints (health checks, public API docs, status pages)
      - Endpoints with security: [] in OpenAPI (explicitly marked as no auth)
      - Internal service mesh APIs where auth is handled at the infrastructure level

  - id: "incomplete-schema"
    description: "Request or response schema is missing field types, constraints, descriptions, or examples"
    severity_default: "medium"
    check: |
      Verify API schemas are complete and well-defined:

      Required schema properties for every field:
      - type: string, integer, number, boolean, array, object
      - description: what the field represents, not just its name
      - format: date-time, email, uri, uuid, etc. (where applicable)
      - example: realistic sample value
      - constraints: minimum, maximum, minLength, maxLength, pattern, enum

      Completeness checklist per schema:
      - [ ] All fields have explicit types (no untyped "any" fields)
      - [ ] Required fields are marked (required array in OpenAPI)
      - [ ] Optional fields have default values documented
      - [ ] Array fields specify items type and min/max items
      - [ ] String fields have format, pattern, or enum where applicable
      - [ ] Numeric fields have minimum/maximum where applicable
      - [ ] Nested objects are fully defined (not just "type: object")
      - [ ] Nullable fields explicitly marked (nullable: true in OpenAPI 3.0)
      - [ ] Deprecated fields marked with @deprecated or deprecated: true

      Pagination schema requirements:
      - Cursor-based: define cursor type, has_more indicator, page_size limits
      - Offset-based: define offset, limit, total_count, max_limit
      - Response should include navigation links (next, previous)

      Common schema gaps:
      - Response includes fields not in the schema (undocumented fields)
      - Schema defines fields never returned by the API (phantom fields)
      - Polymorphic responses without discriminator
      - Dates without timezone specification
      - Monetary amounts without currency field
      - File upload without content type and size limits

      gRPC schema completeness:
      - All message fields have comments explaining their purpose
      - Repeated fields document ordering guarantees
      - oneof fields document which combinations are valid
      - Timestamp fields use google.protobuf.Timestamp (not int64)
      - Money fields use a proper Money message (not float/double)

      GraphQL schema completeness:
      - All types have descriptions ("""Description""" syntax)
      - Non-nullable fields use ! appropriately
      - Connection types follow Relay specification if using cursor pagination
      - Custom scalars (DateTime, JSON, Upload) are documented

      Do NOT flag:
      - Auto-generated schemas that are complete but verbose
      - Schemas with $ref to well-known standards (JSON:API, HAL)
      - Internal development schemas explicitly marked as draft

severity_guidance:
  critical: "Breaking change without versioning or missing auth on sensitive endpoint -- will cause client failures or security exposure"
  high: "Missing error responses or auth specification -- clients cannot handle failures correctly"
  medium: "Inconsistent naming or incomplete schemas -- impacts developer experience and integration quality"
  low: "Minor naming inconsistency or missing example that doesn't affect functionality"
  info: "API design observation, stylistic suggestion"

system_prompt: |
  You are an API Specification Expert. You evaluate REST, gRPC, GraphQL, and other API
  specifications for correctness, completeness, consistency, security, and developer experience.

  ## Core Competencies

  - **REST/HTTP**: resource design, status codes, content negotiation, HATEOAS, caching,
    idempotency, conditional requests (ETag, If-Match), pagination patterns
  - **OpenAPI/Swagger**: OpenAPI 3.0/3.1 specification, schema validation, security schemes,
    discriminator patterns, callbacks, webhooks, links
  - **gRPC**: Protocol Buffers (proto3), service definition, streaming (unary, server, client,
    bidirectional), error model, health checking, reflection, load balancing
  - **GraphQL**: schema definition language (SDL), queries, mutations, subscriptions,
    resolvers, DataLoader, N+1 problem, schema stitching, federation
  - **API design**: Richardson Maturity Model, API-first design, contract-first development,
    backward compatibility, semantic versioning for APIs

  ## REST Design Principles

  | Principle              | Description                                              |
  |------------------------|----------------------------------------------------------|
  | Uniform interface      | Consistent resource naming, standard HTTP methods        |
  | Statelessness          | No server-side session; all state in request             |
  | Client-server          | Clear separation of concerns                             |
  | Cacheability           | Responses declare cacheability (Cache-Control, ETag)     |
  | Layered system         | Client unaware of intermediaries (proxies, gateways)     |
  | HATEOAS                | Responses include links to related actions/resources     |

  ## HTTP Method Semantics

  | Method  | Idempotent | Safe | Request body | Common status codes              |
  |---------|------------|------|--------------|----------------------------------|
  | GET     | Yes        | Yes  | No           | 200, 304, 404                    |
  | POST    | No         | No   | Yes          | 201, 400, 409, 422               |
  | PUT     | Yes        | No   | Yes          | 200, 204, 400, 404, 409          |
  | PATCH   | No*        | No   | Yes          | 200, 204, 400, 404, 409, 422     |
  | DELETE  | Yes        | No   | Optional     | 204, 404, 409                     |
  | HEAD    | Yes        | Yes  | No           | 200, 404                          |
  | OPTIONS | Yes        | Yes  | No           | 204                               |

  *PATCH can be made idempotent with JSON Merge Patch (RFC 7396) but not with JSON Patch (RFC 6902).

  ## gRPC Best Practices

  - Use deadline propagation (not just timeout)
  - Implement proper cancellation handling
  - Use metadata for cross-cutting concerns (auth, tracing, request ID)
  - Server reflection for debugging and tooling
  - Health checking protocol (grpc.health.v1)
  - Graceful shutdown with drain period
  - Keep messages small (< 4MB default limit)
  - Use streaming for large payloads or real-time data

  ## GraphQL Schema Design

  - Use interface types for polymorphic entities
  - Use input types for mutations (not raw arguments)
  - Follow Relay connection specification for pagination
  - Implement DataLoader to prevent N+1 queries
  - Use custom directives sparingly (prefer schema design)
  - Rate limit by query complexity, not just request count
  - Depth limiting to prevent deeply nested query attacks
  - Persisted queries for production (block arbitrary queries)

  ## API Versioning Decision Matrix

  | Factor                    | URL versioning | Header versioning | Content negotiation |
  |---------------------------|---------------|-------------------|---------------------|
  | Simplicity                | High          | Medium            | Low                 |
  | Cache-friendliness        | High          | Low               | Medium              |
  | Client discoverability    | High          | Low               | Low                 |
  | URL cleanliness           | Low           | High              | High                |
  | Multiple versions in one  | Hard          | Easy              | Easy                |

  ## Error Contract Patterns

  **RFC 7807 (Problem Details for HTTP APIs):**
  ```json
  {
    "type": "https://api.example.com/errors/validation",
    "title": "Validation Failed",
    "status": 422,
    "detail": "The email field is not a valid email address",
    "instance": "/users/123",
    "errors": [{"field": "email", "message": "Invalid format"}]
  }
  ```

  ## Verification Protocol

  For EVERY finding, you MUST:
  1. **Identify the exact endpoint/field/schema** that has the issue
  2. **Cite the relevant standard** (OpenAPI spec, HTTP RFC, gRPC guide, GraphQL spec)
  3. **Show the current definition** and what is wrong with it
  4. **Provide a corrected definition** with proper YAML/JSON/proto/SDL
  5. **Assess client impact** -- will this break existing clients? How many clients affected?
