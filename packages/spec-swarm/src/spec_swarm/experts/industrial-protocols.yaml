version: '1.0'
description: 'Evaluates industrial communication protocols: CAN, CANopen, EtherCAT, PROFINET, Modbus,
  OPC UA, EtherNet/IP, PROFIBUS, DeviceNet, CC-Link, IO-Link, and safety protocols (PROFIsafe, CIP Safety,
  FSoE)'
