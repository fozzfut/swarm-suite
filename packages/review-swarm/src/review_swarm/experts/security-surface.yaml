name: "Security Surface Expert"
version: "1.0"
description: "Detects injection vectors, hardcoded secrets, unsafe deserialization, and missing input validation at trust boundaries"
file_patterns:
  - "**/*.py"
  - "**/*.ts"
  - "**/*.js"
  - "**/*.go"
  - "**/*.rs"
  - "**/*.java"
  - "**/*.kt"
  - "**/*.cs"
  - "**/*.rb"
  - "**/*.php"
  - "**/*.ex"
  - "**/*.swift"
  - "**/*.yaml"
  - "**/*.yml"
  - "**/*.env"
  - "**/*.env.*"
  - "**/Dockerfile"
  - "**/docker-compose*.yml"
exclude_patterns:
  - "tests/**"
  - "test/**"
  - "spec/**"
  - "node_modules/**"
  - "vendor/**"
  - "target/**"
  - "build/**"
relevance_signals:
  imports:
    - "flask"
    - "django"
    - "fastapi"
    - "express"
    - "http"
    - "net/http"
    - "actix"
    - "axum"
    - "spring"
    - "gin"
    - "echo"
    - "rails"
    - "phoenix"
  patterns:
    - "request\\."
    - "req\\."
    - "cursor\\.execute"
    - "eval\\("
    - "exec\\("
    - "subprocess"
    - "os\\.system"
    - "child_process"
    - "SQL"
    - "innerHTML"
    - "dangerouslySetInnerHTML"
    - "pickle\\.load"
    - "yaml\\.load"
    - "deserialize"
    - "os\\.environ"
    - "process\\.env"
check_rules:
  - id: "injection-vector"
    description: "User-controlled input is interpolated into SQL, shell commands, or code eval without sanitization"
    severity_default: "critical"
    check: |
      Find places where untrusted input (HTTP request, CLI args, file content, env vars from user)
      flows into:
      1. SQL queries via string interpolation/concatenation (not parameterized)
      2. Shell commands via string interpolation (not safe subprocess API)
      3. Code evaluation (eval, exec, Function(), vm.runInNewContext)
      4. HTML without escaping (XSS)
      5. File paths from user input without sanitization (path traversal)

      CRITICAL: Determine the application type before reporting:
      - **Web app / API server**: ALL of the above apply. User input comes from HTTP.
      - **CLI tool**: CLI args are semi-trusted (user runs the tool). Focus on file content injection.
      - **Desktop app**: No untrusted HTTP input. Path traversal is FALSE unless the app processes
        arbitrary user-provided paths from an untrusted source.
      - **Library**: Flag unsafe patterns, document that callers must sanitize.

      Do NOT flag:
      - Parameterized queries (placeholders: $1, ?, %s with params list)
      - ORM methods (model.filter(), model.where()) -- they parameterize internally
      - Template engines with auto-escaping enabled
      - Desktop apps constructing paths from their own config (no untrusted input)
      - Admin tools designed for trusted operators

  - id: "hardcoded-secret"
    description: "Passwords, API keys, tokens, or private keys hardcoded in source code"
    severity_default: "high"
    check: |
      Find hardcoded secrets:
      - String literals assigned to variables named: password, secret, api_key, token, private_key, auth
      - Base64-encoded strings that look like tokens (length > 20, high entropy)
      - Connection strings with embedded credentials
      - Private keys (-----BEGIN RSA PRIVATE KEY-----)
      Do NOT flag:
      - Environment variable reads (os.environ, process.env)
      - Config file references (config.get("secret"))
      - Test fixtures with obviously fake values ("test-password", "xxx", "changeme")
      - Hash constants (sha256 of known values)
      - Public keys (only private keys are secrets)
      - Example/template files (.env.example, config.sample.yaml)

  - id: "unsafe-deserialization"
    description: "Deserializing untrusted data with a format that allows code execution"
    severity_default: "critical"
    check: |
      Flag deserialization of untrusted data using unsafe formats:
      - Python: pickle.load(), yaml.load() without SafeLoader, marshal.loads()
      - Java: ObjectInputStream.readObject() on untrusted data
      - Ruby: Marshal.load(), YAML.load() on untrusted data
      - PHP: unserialize() on user input
      - .NET: BinaryFormatter.Deserialize()
      Do NOT flag:
      - JSON parsing (json.loads, JSON.parse -- safe by design)
      - YAML with SafeLoader/safe_load
      - Protocol Buffers, MessagePack, FlatBuffers (safe by design)
      - Deserializing data from trusted sources (own database, signed payloads)

  - id: "missing-auth-check"
    description: "API endpoint or route handler accessible without authentication/authorization"
    severity_default: "high"
    check: |
      In web frameworks, find route handlers that:
      1. Handle sensitive operations (create, update, delete, admin)
      2. Don't have authentication middleware/decorator/guard
      3. Don't check user permissions/roles
      Do NOT flag:
      - Public endpoints by design (login, register, health check, public API)
      - Endpoints behind a reverse proxy/gateway that handles auth
      - Internal microservice endpoints (service-to-service auth at network level)
      - Desktop/CLI apps (no HTTP endpoints)

severity_guidance:
  critical: "Injection or unsafe deserialization with confirmed untrusted input path"
  high: "Hardcoded secret in source, missing auth on sensitive endpoint"
  medium: "Potential injection but input source unclear, broad file permissions"
  low: "Security best practice not followed, no confirmed exploit path"
  info: "Security observation, defense-in-depth suggestion"

system_prompt: |
  You are a Security Surface Expert. You find injection vectors, hardcoded secrets,
  unsafe deserialization, and missing authentication checks.

  ## CRITICAL: Application Context Determines Severity

  Before reporting ANY finding, determine the application type:

  | App Type | Trust Boundary | What Matters |
  |----------|---------------|-------------|
  | Web app / API | HTTP requests from internet | Everything: injection, XSS, auth, CSRF |
  | CLI tool | CLI args + file content | File content injection, path traversal from args |
  | Desktop app | Local user | Secrets exposure, unsafe deserialization of files |
  | Library | Caller's input | Document trust requirements, flag obviously unsafe APIs |
  | Internal tool | Trusted operators | Secrets only, injection is low risk |

  **Desktop apps with no network input**: path traversal and SQL injection from HTTP are FALSE POSITIVES.
  **Internal tools for trusted operators**: injection from controlled input is LOW RISK at most.

  ## Verification Before Reporting

  1. **Trace the input source** -- is it actually untrusted? Where does it come from?
  2. **Check for existing sanitization** -- input may be validated upstream (middleware, decorator)
  3. **Check parameterization** -- SQL with ? placeholders is SAFE
  4. **Check template auto-escaping** -- most modern frameworks auto-escape HTML
  5. **Check the deployment context** -- internal vs public, auth at gateway level

  ## Common False Positives (DO NOT report these)

  | Pattern | Why it's safe |
  |---------|--------------|
  | Path construction from config values | Config is trusted, not user input |
  | SQL with parameterized queries | Placeholders prevent injection |
  | Template with auto-escaping | Framework handles XSS |
  | Desktop app path from own settings | No untrusted source |
  | .env.example with placeholder values | Not real secrets |
  | Test credentials ("test123") | Fake values for tests |
  | Internal API behind VPN/gateway | Auth at network level |
  | ORM query builder methods | Parameterized internally |
