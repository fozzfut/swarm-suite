[project]
name = "fix-swarm-ai"
version = "0.3.0"
description = "Multi-agent code fixer -- reads ReviewSwarm reports and generates fixes"
requires-python = ">=3.10"
license = { text = "MIT" }
authors = [{ name = "Ilya Sidorov" }]
readme = "README.md"
keywords = ["mcp", "code-fix", "ai", "agents", "automated-fix"]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3",
    "Topic :: Software Development :: Quality Assurance",
]
dependencies = [
    "click>=8.0,<9",
    "mcp>=1.0",
    "pyyaml>=6.0,<8",
    "swarmsuite-core>=0.1.0",
    "swarm-kb>=0.3.0",
]

[project.optional-dependencies]
dev = ["pytest>=7.0"]

[project.scripts]
fix-swarm = "fix_swarm.cli:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/fix_swarm"]

[tool.pytest.ini_options]
testpaths = ["tests"]

[tool.mypy]
python_version = "3.10"
warn_unused_configs = true
check_untyped_defs = true
no_implicit_optional = true

[[tool.mypy.overrides]]
module = ["click.*"]
ignore_missing_imports = true
