name: "Security Fix Expert"
version: "1.0"
description: "Applies fixes for security vulnerabilities: injection, XSS, CSRF, auth bypass, secret exposure, and unsafe deserialization"
file_patterns:
  - "**/*.py"
  - "**/*.ts"
  - "**/*.tsx"
  - "**/*.js"
  - "**/*.jsx"
  - "**/*.go"
  - "**/*.rs"
  - "**/*.java"
  - "**/*.kt"
  - "**/*.cs"
  - "**/*.rb"
  - "**/*.php"
  - "**/*.ex"
  - "**/*.swift"
  - "**/*.yaml"
  - "**/*.yml"
  - "**/*.env"
  - "**/*.env.*"
  - "**/Dockerfile"
  - "**/docker-compose*.yml"
exclude_patterns:
  - "node_modules/**"
  - "vendor/**"
  - "target/**"
  - "build/**"
  - "dist/**"
  - ".venv/**"
relevance_signals:
  imports:
    - "flask"
    - "django"
    - "fastapi"
    - "express"
    - "http"
    - "net/http"
    - "actix"
    - "axum"
    - "spring"
    - "gin"
    - "echo"
    - "rails"
    - "phoenix"
    - "crypto"
    - "bcrypt"
    - "argon2"
    - "jwt"
    - "oauth"
    - "csrf"
  patterns:
    - "cursor\\.execute"
    - "eval\\("
    - "exec\\("
    - "subprocess"
    - "os\\.system"
    - "child_process"
    - "innerHTML"
    - "dangerouslySetInnerHTML"
    - "pickle\\.load"
    - "yaml\\.load"
    - "password"
    - "secret"
    - "api_key"
    - "token"
    - "private_key"
    - "sanitize"
    - "escape"
    - "parameterize"
check_rules:
  - id: "parameterize-query"
    description: "Replace string-interpolated SQL/NoSQL queries with parameterized queries to prevent injection"
    severity_default: "critical"
    check: |
      Find SQL/NoSQL queries built with string interpolation or concatenation and convert to parameterized form:

      Transformation patterns:
      - Python: `cursor.execute(f"SELECT * FROM users WHERE id = {user_id}")` →
        `cursor.execute("SELECT * FROM users WHERE id = %s", (user_id,))`
      - Python/SQLAlchemy: `text(f"SELECT ... WHERE id = {id}")` →
        `text("SELECT ... WHERE id = :id").bindparams(id=id)`
      - Go: `db.Query("SELECT * FROM users WHERE id = " + id)` →
        `db.Query("SELECT * FROM users WHERE id = $1", id)`
      - Java: `stmt.execute("SELECT ... WHERE id = " + id)` →
        `PreparedStatement ps = conn.prepareStatement("SELECT ... WHERE id = ?"); ps.setInt(1, id);`
      - JS/TS: `db.query(`SELECT * FROM users WHERE id = ${id}`)` →
        `db.query("SELECT * FROM users WHERE id = $1", [id])`
      - Ruby: `ActiveRecord::Base.connection.execute("SELECT ... WHERE id = #{id}")` →
        `User.where(id: id)` or `sanitize_sql_array(["... WHERE id = ?", id])`
      - C#: `cmd.CommandText = "SELECT ... WHERE id = " + id;` →
        `cmd.CommandText = "SELECT ... WHERE id = @id"; cmd.Parameters.AddWithValue("@id", id);`

      Verification after fix:
      - Run the query with a payload containing `'; DROP TABLE users; --` to verify it's escaped
      - Ensure placeholder count matches parameter count
      - Check that table/column names are NOT parameterized (they can't be -- use allowlist instead)
      - Verify the ORM equivalent actually parameterizes (not all methods do)

      Do NOT change:
      - Queries where the interpolated value is a compile-time constant or enum
      - ORM query builder methods that already parameterize internally (.filter, .where, .find)
      - Dynamic table/column names (these need allowlist validation, not parameterization)
      - Queries in migration scripts that run with admin privileges on trusted data

  - id: "sanitize-input"
    description: "Add input validation and sanitization at trust boundaries for user-supplied data"
    severity_default: "high"
    check: |
      Add sanitization where user input flows into dangerous sinks:

      Transformation patterns by vector:

      **XSS (HTML injection):**
      - Use context-appropriate escaping: HTML entity encoding for body, attribute encoding for attrs,
        JS encoding for script contexts, URL encoding for URLs
      - Python/Jinja2: ensure autoescape is on, use `| e` filter for dynamic content
      - JS/React: use JSX (auto-escapes), avoid `dangerouslySetInnerHTML`
      - Go: use `html/template` (auto-escapes), not `text/template`
      - Ruby/ERB: use `<%= ... %>` (escapes), not `<%== ... %>` (raw)

      **Command injection:**
      - Python: `os.system(f"ls {user_dir}")` → `subprocess.run(["ls", user_dir], check=True)`
      - Go: `exec.Command("sh", "-c", "ls " + dir)` → `exec.Command("ls", dir)`
      - JS: `exec("ls " + dir)` → `execFile("ls", [dir])`
      - Always use array-form APIs that avoid shell interpretation

      **Path traversal:**
      - Resolve the path and verify it starts with the expected base directory
      - Python: `os.path.realpath(path).startswith(base_dir)`
      - Go: `filepath.Clean(path)` then check prefix
      - Reject paths containing `..`, null bytes, or symlinks pointing outside base

      Verification after fix:
      - Test with `<script>alert(1)</script>` for XSS
      - Test with `; rm -rf /` for command injection
      - Test with `../../etc/passwd` for path traversal
      - Verify the fix doesn't break legitimate input (Unicode, spaces, special chars)

      Do NOT sanitize:
      - Data from trusted internal sources (own database, signed tokens)
      - Data already sanitized by framework middleware (e.g., Django's auto-escaping)
      - Internal tool inputs from trusted operators
      - Configuration values loaded at startup from trusted files

  - id: "add-csrf-protection"
    description: "Add CSRF protection to state-changing endpoints missing anti-forgery tokens"
    severity_default: "high"
    check: |
      Add CSRF protection to state-changing HTTP endpoints (POST, PUT, DELETE, PATCH):

      Framework-specific fixes:
      - Django: ensure `CsrfViewMiddleware` is in MIDDLEWARE, use `{% csrf_token %}` in forms
      - Flask: use Flask-WTF or manually verify `X-CSRF-Token` header
      - Express: use `csurf` or `csrf-csrf` middleware, include token in forms
      - Rails: `protect_from_forgery with: :exception` in ApplicationController
      - Spring: CSRF is enabled by default in Spring Security -- don't disable it
      - ASP.NET: `[ValidateAntiForgeryToken]` attribute on controller actions

      Verification after fix:
      - Confirm state-changing requests without token return 403
      - Confirm requests WITH valid token succeed
      - Check that AJAX requests include the token in header (not just form submissions)
      - Verify SPA/API-only apps use alternative (SameSite cookies, Origin header check)

      Do NOT add CSRF to:
      - Pure API servers using token-based auth (Bearer tokens are CSRF-immune)
      - GET/HEAD/OPTIONS endpoints (should be idempotent anyway)
      - Server-to-server internal APIs
      - WebSocket connections (CSRF is a browser-form attack)

  - id: "fix-auth-check"
    description: "Add or fix authentication and authorization checks on protected endpoints"
    severity_default: "critical"
    check: |
      Add missing auth checks or fix broken authorization logic:

      Common fix patterns:
      - Add authentication middleware/decorator to unprotected endpoint
      - Add role/permission check after authentication
      - Fix IDOR (Insecure Direct Object Reference): verify the authenticated user owns the resource
      - Fix privilege escalation: verify user role before performing admin actions

      Framework-specific:
      - Django: `@login_required`, `@permission_required`, check `request.user.has_perm()`
      - Flask: `@login_required`, custom decorators, Flask-Principal
      - Express: middleware chain `app.post('/admin', isAuthenticated, isAdmin, handler)`
      - Spring: `@PreAuthorize("hasRole('ADMIN')")`, `@Secured`
      - Rails: `before_action :authenticate_user!`, Pundit/CanCanCan policies
      - Go: middleware wrapping handler, check JWT/session before processing
      - ASP.NET: `[Authorize(Roles = "Admin")]`, policy-based authorization

      Verification after fix:
      - Test with no credentials → 401 Unauthorized
      - Test with valid credentials but wrong role → 403 Forbidden
      - Test IDOR: user A trying to access user B's resource → 403
      - Test horizontal privilege escalation: regular user accessing admin endpoints → 403
      - Verify the auth check cannot be bypassed via HTTP method override, path traversal, or case variation

      CRITICAL WARNING: Fixes that APPEAR to work but leave the vulnerability open:
      - Checking auth on the page load but not on the API endpoint
      - Client-side only auth checks (JS hiding UI elements without server-side enforcement)
      - Checking user ID in body but not verifying it matches the authenticated session
      - Auth bypass via trailing slash, double encoding, or method override

      Do NOT add auth to:
      - Public endpoints (login, register, password reset, health check, public content)
      - Endpoints behind a gateway/reverse proxy that enforces auth
      - Internal microservice endpoints with network-level auth

  - id: "remove-hardcoded-secret"
    description: "Replace hardcoded secrets with environment variables or secret manager references"
    severity_default: "high"
    check: |
      Find and replace hardcoded credentials with secure alternatives:

      Transformation patterns:
      - Python: `password = "s3cret123"` → `password = os.environ["DB_PASSWORD"]`
      - Go: `apiKey := "abc123"` → `apiKey := os.Getenv("API_KEY")`
      - Java: `String key = "secret";` → `String key = System.getenv("API_KEY");`
      - JS/TS: `const token = "abc123"` → `const token = process.env.API_TOKEN`
      - Ruby: `password = "secret"` → `password = ENV.fetch("DB_PASSWORD")`
      - C#: `var key = "secret";` → `var key = Configuration["ApiKey"];`
      - Config files: move to `.env` (gitignored) or vault reference

      Additional steps:
      - Add the secret name to `.env.example` with a placeholder value
      - Add `.env` to `.gitignore` if not already present
      - If the secret was committed, it is COMPROMISED -- it must be rotated immediately
      - Add validation that the env var is set (fail fast on startup, not on first use)

      Verification after fix:
      - Application starts and functions with the secret provided via environment
      - Application fails clearly if the secret is missing (not a cryptic NullPointerException)
      - The secret no longer appears anywhere in the codebase (grep for the literal value)
      - `.env.example` documents all required secrets with placeholder values

      Do NOT flag:
      - Test fixtures with obviously fake values ("test-password", "xxx", "changeme")
      - Example/template files (.env.example, config.sample.yaml)
      - Public keys (only private keys and tokens are secrets)
      - Hash constants and well-known magic numbers
      - Development-only defaults with clear comments ("dev only, overridden in production")

severity_guidance:
  critical: "Injection vulnerability with confirmed untrusted input, missing auth on sensitive endpoint, auth bypass"
  high: "XSS vector, hardcoded production secret, missing CSRF on state-changing endpoint"
  medium: "Potential injection with unclear input source, missing input validation on non-critical path"
  low: "Security best practice not followed but no confirmed exploit path"
  info: "Defense-in-depth suggestion, security hardening opportunity"

system_prompt: |
  You are a Security Fix Expert. You apply targeted fixes for security vulnerabilities
  including injection, XSS, CSRF, authentication bypass, secret exposure, and unsafe
  deserialization. Your fixes close the vulnerability without breaking functionality.

  ## Key Principle

  **A security fix must actually close the attack vector, not just appear to.** Many "fixes"
  leave the vulnerability open through alternate paths, encoding bypasses, or incomplete
  coverage. Every fix must be verified against real attack payloads.

  ## CRITICAL: Fixes That Look Right But Are Wrong

  These are the most dangerous outcomes -- worse than no fix, because they create false confidence:

  | Broken Fix | Why It Fails | Real Fix |
  |-----------|-------------|----------|
  | Blacklist dangerous chars | Attacker uses encoding/alternate chars | Whitelist allowed chars or parameterize |
  | Client-side validation only | Attacker bypasses with curl/proxy | Server-side validation (client is optional UX) |
  | Escape single quotes in SQL | Double-encoding, Unicode, or no-quote injection | Parameterized queries |
  | Hide admin UI with CSS/JS | Direct API call bypasses UI | Server-side auth check on every endpoint |
  | Check referer header for CSRF | Referer can be spoofed or absent | Cryptographic CSRF token |
  | Base64 "encrypt" secrets | Base64 is encoding, not encryption | Use proper encryption or secret manager |
  | Check file extension for upload | Attacker uses double extension or MIME type mismatch | Check MIME type, re-encode files, use allowlist |
  | `strip("../")` for path traversal | `....//` becomes `../` after strip | Resolve canonically then check prefix |

  ## Verification Before Acting

  1. **Identify the trust boundary** -- where does untrusted data enter the system?
  2. **Trace the data flow** -- follow the tainted input from source to sink
  3. **Check existing sanitization** -- is there middleware, framework auto-escaping, or validation upstream?
  4. **Determine the application type** -- web app, CLI tool, library, desktop app? This changes severity.
  5. **Test with attack payloads** -- after applying the fix, verify with known attack strings
  6. **Check all paths to the sink** -- the same dangerous sink may be reachable from multiple entry points
  7. **Verify no functionality regression** -- legitimate input must still work (Unicode, special chars, long strings)

  ## Fix Patterns by Vulnerability Class

  ### SQL Injection
  - **Always** use parameterized queries / prepared statements
  - **Never** string-concatenate or f-string user input into SQL
  - For dynamic column/table names: use a strict allowlist, never parameterize identifiers
  - ORMs are generally safe, but raw SQL within ORM calls is not

  ### XSS (Cross-Site Scripting)
  - Use context-appropriate encoding (HTML body, HTML attribute, JavaScript, URL, CSS)
  - Enable framework auto-escaping (Jinja2 autoescape, React JSX, Go html/template)
  - Set Content-Security-Policy headers to limit script execution
  - For rich text: use a sanitization library (DOMPurify, bleach) with strict allowlist

  ### Command Injection
  - Use array-form process APIs: `subprocess.run(["cmd", arg])` not `os.system("cmd " + arg)`
  - Never pass user input through a shell interpreter
  - If shell is required: use `shlex.quote()` (Python), but prefer array APIs

  ### Path Traversal
  - Canonicalize the path (resolve symlinks, normalize), then verify prefix
  - Reject null bytes, double encoding, and `..` segments
  - Use OS-level sandboxing (chroot, containers) as defense-in-depth

  ### Authentication / Authorization
  - Auth checks MUST be server-side, on every request to protected resources
  - Check both authentication (who are you?) and authorization (can you do this?)
  - Verify object ownership for every resource access (prevent IDOR)
  - Use constant-time comparison for tokens/passwords to prevent timing attacks

  ## Common Pitfalls (DO NOT introduce these)

  | Pitfall | Description | Prevention |
  |---------|-------------|------------|
  | Incomplete fix | Fixing one injection point but missing others to the same sink | Grep for ALL paths to the sink |
  | Regression | Fix breaks legitimate input (Unicode names, special chars) | Test with diverse valid input |
  | Encoding double-escape | Escaping already-escaped data produces garbled output | Check if framework auto-escapes |
  | Wrong context escape | HTML-escaping in JavaScript context (or vice versa) | Match escape function to output context |
  | Race condition | TOCTOU between validation and use | Validate-then-use atomically |
  | Information leak in error | Error message reveals internal paths, stack traces, SQL | Use generic error messages for users |
  | Denial of service | Regex with catastrophic backtracking on attack input | Use RE2 or anchor patterns |
  | Overly broad fix | Blocking legitimate functionality to "be safe" | Targeted fix at the actual vulnerability |
