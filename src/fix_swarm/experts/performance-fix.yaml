name: "Performance Fix Expert"
version: "1.0"
description: "Applies performance optimizations: batch queries, add caching, fix N+1, replace quadratic algorithms, and eliminate blocking I/O in hot paths"
file_patterns:
  - "**/*.py"
  - "**/*.ts"
  - "**/*.tsx"
  - "**/*.js"
  - "**/*.jsx"
  - "**/*.go"
  - "**/*.rs"
  - "**/*.java"
  - "**/*.kt"
  - "**/*.cs"
  - "**/*.cpp"
  - "**/*.c"
  - "**/*.rb"
  - "**/*.ex"
  - "**/*.exs"
  - "**/*.swift"
  - "**/*.php"
exclude_patterns:
  - "tests/**"
  - "test/**"
  - "spec/**"
  - "docs/**"
  - "node_modules/**"
  - "vendor/**"
  - "target/**"
  - "build/**"
  - "dist/**"
  - ".venv/**"
relevance_signals:
  imports:
    - "sqlalchemy"
    - "django.db"
    - "activerecord"
    - "hibernate"
    - "javax.persistence"
    - "jakarta.persistence"
    - "gorm"
    - "database/sql"
    - "ecto"
    - "prisma"
    - "typeorm"
    - "sequelize"
    - "knex"
    - "mongoose"
    - "EntityFramework"
    - "Microsoft.EntityFrameworkCore"
    - "redis"
    - "memcached"
    - "functools"
    - "cachetools"
  patterns:
    - "SELECT.*FROM"
    - "for.*in.*query"
    - "cursor\\.execute"
    - "\\.all\\(\\)"
    - "\\.find\\(.*\\.find\\("
    - "nested.*for"
    - "\\.filter\\("
    - "\\.objects\\."
    - "prefetch_related"
    - "select_related"
    - "includes\\("
    - "eager_load"
    - "N\\+1"
    - "cache"
    - "memoize"
check_rules:
  - id: "batch-queries"
    description: "Replace individual database queries in a loop with a single batch query"
    severity_default: "high"
    check: |
      Transform loop-based individual queries into batch operations:

      Transformation patterns:
      - Python/Django:
        `for id in ids: obj = Model.objects.get(pk=id)` →
        `objs = Model.objects.filter(pk__in=ids)` then build a dict for lookup
      - Python/SQLAlchemy:
        `for id in ids: session.query(M).get(id)` →
        `session.query(M).filter(M.id.in_(ids)).all()`
      - Go:
        `for _, id := range ids { db.First(&obj, id) }` →
        `db.Where("id IN ?", ids).Find(&objs)`
      - Java/JPA:
        `for (Long id : ids) { em.find(Entity.class, id); }` →
        `em.createQuery("SELECT e FROM Entity e WHERE e.id IN :ids").setParameter("ids", ids)`
      - JS/TS (Prisma):
        `for (const id of ids) { await prisma.user.findUnique({where: {id}}) }` →
        `await prisma.user.findMany({where: {id: {in: ids}}})`
      - Ruby/Rails:
        `ids.each { |id| User.find(id) }` →
        `User.where(id: ids)`
      - C#/EF:
        `foreach (var id in ids) { context.Users.Find(id); }` →
        `context.Users.Where(u => ids.Contains(u.Id)).ToList()`

      Verification after fix:
      - Result set contains the same records in the same logical order
      - Missing IDs are handled (batch query may silently skip, loop would throw)
      - Database query count reduced from N to 1 (verify with query logging)
      - Memory usage is acceptable (batch loading 1M records may OOM)

      Do NOT batch:
      - Queries with different WHERE clauses per iteration (not a simple IN)
      - Loops with bounded small iteration count (< 5) where clarity matters more
      - Queries that intentionally process one-at-a-time for backpressure/rate limiting

  - id: "add-eager-loading"
    description: "Add eager loading / preloading to fix N+1 query patterns on ORM relationships"
    severity_default: "high"
    check: |
      Add eager loading when ORM lazy-loads relationships inside loops:

      Transformation patterns:
      - Python/Django:
        `authors = Author.objects.all()` → `authors = Author.objects.prefetch_related('books').all()`
        or `Author.objects.select_related('publisher').all()` for ForeignKey
      - Python/SQLAlchemy:
        `session.query(Author).all()` → `session.query(Author).options(joinedload(Author.books)).all()`
        or `subqueryload` for large result sets
      - Ruby/Rails:
        `Author.all.each { |a| a.books.count }` → `Author.includes(:books).all`
        or `Author.eager_load(:books)` for JOIN-based loading
      - Java/Hibernate:
        Add `@Fetch(FetchMode.JOIN)` or use `JOIN FETCH` in JPQL:
        `SELECT a FROM Author a JOIN FETCH a.books`
      - Go/GORM:
        `db.Find(&authors)` → `db.Preload("Books").Find(&authors)`
      - JS/TS (Prisma):
        `prisma.author.findMany()` → `prisma.author.findMany({include: {books: true}})`
      - C#/EF:
        `context.Authors.ToList()` → `context.Authors.Include(a => a.Books).ToList()`

      Choosing the right strategy:
      - `select_related` / `JOIN FETCH` / `Include`: use for to-one relationships (single JOIN)
      - `prefetch_related` / `subqueryload` / `Preload`: use for to-many relationships (separate query)
      - JOIN-based loading for small result sets; separate query for large ones (avoids cartesian explosion)

      Verification after fix:
      - Query count reduced from N+1 to 1 or 2
      - Result data is identical (eager loading changes query strategy, not results)
      - No cartesian explosion (JOIN on multiple to-many relationships)
      - Memory usage acceptable (eager loading pulls more data upfront)

      Do NOT add eager loading:
      - When the relationship is never accessed in the current code path
      - When paginated access makes eager loading wasteful (load 1000 books but only show 10)
      - When the relationship has a custom scope/filter that eager loading would bypass

  - id: "replace-linear-search"
    description: "Replace O(n) linear searches in loops with O(1) hash-based lookups"
    severity_default: "high"
    check: |
      Replace linear search patterns with hash-based data structures:

      Transformation patterns:
      - Python: `if x in large_list:` → `large_set = set(large_list); if x in large_set:`
      - Go: `for _, v := range slice { if v == target { ... } }` →
        build `map[Type]bool` from slice, then `if m[target] { ... }`
      - Java: `list.contains(x)` in loop → `Set<T> s = new HashSet<>(list); s.contains(x)`
      - JS/TS: `arr.includes(x)` or `arr.find(e => e.id === x)` in loop →
        `const map = new Map(arr.map(e => [e.id, e])); map.get(x)`
      - Rust: `vec.iter().find(|v| v == &x)` in loop →
        `let set: HashSet<_> = vec.iter().collect(); set.contains(&x)`
      - C#: `list.Contains(x)` in loop → `var set = new HashSet<T>(list); set.Contains(x)`
      - Ruby: `arr.include?(x)` in loop → `s = arr.to_set; s.include?(x)`

      Build the lookup structure ONCE before the loop, not inside the loop.

      Verification after fix:
      - Same elements are found / matched as before
      - Hash function is correct for the type (custom Eq/Hash for structs)
      - Memory overhead of the hash set/map is acceptable
      - Order-dependent behavior is preserved if needed (hash sets are unordered)

      Do NOT replace:
      - Searches on small collections (< 20 items) -- overhead of building hash may exceed savings
      - Searches where the list changes between iterations
      - Searches where maintaining insertion order matters (use LinkedHashSet/OrderedDict)
      - Single searches (not in a loop) -- building a set for one lookup is slower

  - id: "add-caching"
    description: "Add caching for expensive computations or I/O operations called repeatedly with same inputs"
    severity_default: "medium"
    check: |
      Add caching where the same expensive operation is called multiple times with identical inputs:

      Transformation patterns:
      - Python: `@functools.lru_cache(maxsize=256)` for pure functions with hashable args
        or `@functools.cache` for unbounded cache (Python 3.9+)
        or `cachetools.TTLCache` for time-based expiration
      - Go: `sync.Map` or custom cache with `sync.RWMutex`, or use `groupcache`/`bigcache`
      - Java: `ConcurrentHashMap.computeIfAbsent()`, Guava `CacheBuilder`, Caffeine
      - JS/TS: memoization with `Map`, `lru-cache` package, or React `useMemo`/`useCallback`
      - Rust: `once_cell::Lazy`, `cached` crate, or manual `HashMap` with `RwLock`
      - C#: `MemoryCache`, `ConcurrentDictionary.GetOrAdd()`, `Lazy<T>`
      - Ruby: `||=` pattern for instance variables, `ActiveSupport::Cache`

      Cache design checklist:
      - Set a maximum size to prevent unbounded memory growth
      - Choose TTL based on how stale the data can be
      - Ensure cache key includes ALL inputs that affect the output
      - For mutable inputs, cache on a stable key (ID), not the object itself
      - Consider cache invalidation strategy (TTL, event-driven, manual)
      - Thread-safety: use thread-safe cache in concurrent contexts

      Verification after fix:
      - First call computes the result; subsequent calls with same input return cached value
      - Cache key correctly differentiates different inputs
      - Cache has a size limit and eviction policy
      - Stale cache entries don't cause correctness issues
      - Memory usage stays bounded under load

      Do NOT cache:
      - Operations with side effects (writes, notifications, external API calls with side effects)
      - Results that must always be fresh (real-time data, security-critical lookups)
      - Operations that are already fast (< 1ms) -- cache overhead may exceed savings
      - Results that vary by request context (current user, timestamp) without including context in key

  - id: "fix-blocking-io"
    description: "Replace blocking I/O in async/hot paths with non-blocking alternatives or offload to thread pool"
    severity_default: "medium"
    check: |
      Replace blocking I/O operations in async contexts or request handlers:

      Transformation patterns:
      - Python (asyncio):
        `data = open(path).read()` in async func →
        `data = await asyncio.to_thread(open(path).read)` or use `aiofiles`
        `resp = requests.get(url)` → `resp = await aiohttp.get(url)` or `httpx.AsyncClient`
      - JS/TS:
        `fs.readFileSync(path)` in server handler →
        `await fs.promises.readFile(path)` or `fs.readFile` with callback
        `child_process.execSync` → `child_process.exec` with promisify
      - Rust:
        `std::fs::read(path)` in async fn →
        `tokio::fs::read(path).await` or `tokio::task::spawn_blocking(|| std::fs::read(path))`
      - Java:
        `Thread.sleep(1000)` in servlet → `CompletableFuture.delayedExecutor(1, TimeUnit.SECONDS)`
        Blocking `InputStream.read()` in reactive handler → use reactive streams
      - C#:
        `File.ReadAllText(path)` in async method →
        `await File.ReadAllTextAsync(path)`
        `.Result` or `.Wait()` on Task → `await` the Task

      Verification after fix:
      - Operation still completes successfully with same results
      - Event loop / async runtime is not blocked during I/O
      - Error handling is preserved (async errors must be caught)
      - No deadlocks introduced (don't `await` inside a lock in async code)

      Do NOT change:
      - Blocking I/O in CLI tools (inherently sequential, blocking is fine)
      - Blocking I/O in Go (goroutine scheduler handles it natively)
      - Startup / initialization code that runs once
      - Background threads explicitly designed for blocking work
      - Code already using thread pool offloading

severity_guidance:
  critical: "N+1 or quadratic algorithm on production-scale data with measurable impact on latency or availability"
  high: "N+1 query, unbatched queries in loop, or quadratic search on data that grows with usage"
  medium: "Blocking I/O in hot path, missing cache for repeated expensive computation"
  low: "Minor inefficiency, optimization opportunity with modest impact"
  info: "Performance observation, potential optimization if workload grows"

system_prompt: |
  You are a Performance Fix Expert. You apply targeted optimizations to fix N+1 queries,
  batch individual queries, add caching, replace quadratic algorithms with linear ones,
  and eliminate blocking I/O in hot paths. Your fixes measurably improve performance
  without sacrificing correctness.

  ## Key Principle

  **Correctness always comes before performance. An incorrect fast program is worse than a
  correct slow one.** Every optimization you apply must produce identical results to the
  original code. Measure before and after. If you can't verify correctness, don't apply the fix.

  ## Verification Before Acting

  1. **Measure the baseline** -- what is the current performance? Query count, latency, memory?
  2. **Confirm the bottleneck** -- is this actually the slow part? Don't optimize cold paths.
  3. **Check data scale** -- does this operate on 10 items or 10 million? Scale determines severity.
  4. **Check execution frequency** -- once at startup vs. every request vs. tight inner loop?
  5. **Look for existing optimization** -- is there prefetching, caching, or batching you missed?
  6. **Verify correctness after fix** -- same results, same error handling, same edge case behavior.
  7. **Check memory impact** -- caching and eager loading trade memory for speed. Is that acceptable?

  ## Optimization Decision Matrix

  | Problem | Fix | Risk | Verify |
  |---------|-----|------|--------|
  | N+1 queries | Eager loading / prefetch | Cartesian explosion, memory | Query count, result equality |
  | Individual queries in loop | Batch with IN clause | Missing records, order | Record count, order |
  | Linear search in loop | Build hash set/map | Memory, hash collisions | Same elements found |
  | Missing cache | Add LRU/TTL cache | Staleness, memory growth | Cache hit rate, max size |
  | Blocking I/O in async | Use async API or offload | Error handling, deadlock | Same results, no blocking |
  | Quadratic algorithm | Better data structure | Edge cases, order | Same output for all inputs |

  ## Common Pitfalls (DO NOT introduce these)

  | Pitfall | Description | Prevention |
  |---------|-------------|------------|
  | Premature optimization | Optimizing code that isn't a bottleneck | Profile first, optimize bottlenecks only |
  | Correctness regression | Optimization changes results or error behavior | Test with same inputs, compare outputs |
  | Unbounded cache | Cache grows forever, eventually OOM | Always set maxsize, TTL, or eviction policy |
  | Cartesian explosion | JOIN-based eager loading on multiple to-many relations | Use subquery/separate-query for to-many |
  | Lost error handling | Batch query silently skips missing records | Check result count matches input count |
  | Cache key collision | Different inputs map to same cache key | Include ALL relevant inputs in key |
  | Stale cache | Cached data is out of date, causes incorrect behavior | Set appropriate TTL, add invalidation |
  | Deadlock | `await` inside lock, or `.Result` blocking async context | Never block async code synchronously |
  | Over-batching | Loading 1M records into memory at once | Add pagination or chunking to batches |
  | Race condition in cache | Two threads compute same value simultaneously | Use atomic get-or-compute (computeIfAbsent) |

  ## Language-Specific Caching Patterns

  **Python:**
  - `functools.lru_cache(maxsize=N)` for pure functions with hashable args
  - `functools.cache` (3.9+) for unbounded memoization (use with caution)
  - `cachetools.TTLCache(maxsize=N, ttl=seconds)` for time-based expiration
  - Django: `@cache_page`, `cache.get/set`, `QuerySet.cache()` with django-cacheops

  **Go:**
  - `sync.Map` for simple concurrent cache (but no eviction)
  - `groupcache` / `bigcache` / `ristretto` for production caches
  - Manual cache: `map` + `sync.RWMutex` + size check + eviction

  **Java:**
  - `ConcurrentHashMap.computeIfAbsent()` for simple cases
  - Caffeine `Caffeine.newBuilder().maximumSize(N).expireAfterWrite(duration).build()`
  - Spring `@Cacheable("name")` with configured CacheManager

  **JavaScript/TypeScript:**
  - `Map` for simple memoization (manual eviction needed)
  - `lru-cache` npm package for bounded LRU cache
  - React: `useMemo`, `useCallback`, `React.memo` for render optimization
  - Node.js: `node-cache`, `keyv` for server-side caching

  **Rust:**
  - `once_cell::Lazy` for lazy static initialization
  - `cached` crate with `#[cached]` macro for function memoization
  - Manual: `HashMap` + `RwLock` + size-based eviction

  **C#:**
  - `MemoryCache` with `MemoryCacheEntryOptions` for size and TTL
  - `ConcurrentDictionary.GetOrAdd()` for thread-safe lazy init
  - `Lazy<T>` for expensive one-time computations
  - `IDistributedCache` for multi-instance scenarios

  ## Batch Query Sizing

  When converting loops to batch queries, consider the batch size:
  - SQL IN clause: most databases handle up to ~1000 parameters efficiently
  - For larger sets, chunk into batches of 500-1000 and combine results
  - PostgreSQL: use ANY(ARRAY[...]) for better performance on large IN clauses
  - Monitor query plan -- very large IN clauses may cause the optimizer to choose poorly
