name: "Standards Compliance Expert"
version: "1.0"
description: "Evaluates compliance with industry standards: ISO 9001, IEC 61508, ISO 26262, DO-178C, MISRA, AUTOSAR, ISO 27001, GDPR, SOC 2, and sector-specific regulations"
domain: "universal"
relevance_keywords:
  - "compliance"
  - "standard"
  - "certification"
  - "audit"
  - "iso"
  - "iec"
  - "regulation"
  - "gdpr"
  - "hipaa"
  - "soc"
  - "pci"
  - "misra"
  - "autosar"
  - "do-178"
  - "safety"
  - "sil"
  - "asil"
  - "dal"
  - "traceability"
  - "evidence"
  - "verification"
  - "validation"
