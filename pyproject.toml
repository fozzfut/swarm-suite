[project]
name = "review-swarm"
version = "0.3.3"
description = "Collaborative AI code review MCP server -- shared whiteboard for multi-agent code review via MCP"
requires-python = ">=3.10"
license = { text = "MIT" }
authors = [
    { name = "fozzfut" },
]
readme = "README.md"
keywords = ["mcp", "code-review", "ai", "agents", "collaborative", "llm"]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Topic :: Software Development :: Quality Assurance",
]
dependencies = [
    "mcp>=1.6,<2",
    "click>=8.0,<9",
    "pyyaml>=6.0,<8",
]

[project.urls]
Homepage = "https://github.com/fozzfut/review-swarm"
Repository = "https://github.com/fozzfut/review-swarm"

[project.optional-dependencies]
dev = [
    "pytest>=8.0",
    "pytest-asyncio>=0.23",
    "mypy>=1.8",
]

[project.scripts]
review-swarm = "review_swarm.cli:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/review_swarm"]

[tool.hatch.build]
include = ["src/review_swarm/**/*.py", "src/review_swarm/**/*.yaml"]

[tool.pytest.ini_options]
testpaths = ["tests"]
asyncio_mode = "auto"

[tool.mypy]
python_version = "3.10"
warn_unused_configs = true
warn_redundant_casts = true
warn_unused_ignores = true
check_untyped_defs = true
no_implicit_optional = true

[[tool.mypy.overrides]]
module = ["mcp.*", "yaml.*", "click.*"]
ignore_missing_imports = true
